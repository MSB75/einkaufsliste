<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einkaufsliste</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

header {
  background:#4CAF50;
  color:white;
  text-align:center;
  padding:18px;
  font-size:1.8em;
}

.container {
  display:flex;
  flex-wrap:wrap;
}

.categories { width:60%; padding:10px; }
.cart { width:40%; background:#fff; padding:10px; }

.category {
  margin-bottom:14px;
  border-radius:16px;
  overflow:hidden;
}

.category h2 {
  color:white;
  margin:0;
  padding:12px;
  font-size:1.3em;
}

.items {
  display:flex;
  flex-wrap:wrap;
}

/* ITEM BUTTONS */
.item {
  width:130px;
  height:155px;
  margin:8px;
  background:white;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:2px solid #ddd;
  transition: transform 0.1s, box-shadow 0.1s;
}

.item:active {
  transform: scale(0.95);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* Bild-Container verhindert Stauchung */
.item-img-wrap {
  width:90px;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.item img {
  max-width:90px;
  max-height:90px;
  width:auto;
  height:auto;
  object-fit:contain;
}

.label {
  font-size:clamp(12px,2.2vw,15px);
  text-align:center;
  padding:4px 4px 0 4px;
  line-height:1.2;
}

/* Warenkorb */
.cart-items {
  display:flex;
  flex-wrap:wrap;
}

.cart-item {
  width:90px;
  height:90px;
  margin:6px;
  background:#eee;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition: transform 0.1s;
}

.cart-item:active {
  transform: scale(0.9);
}

.cart-item img {
  max-width:65px;
  max-height:65px;
  width:auto;
  height:auto;
  object-fit:contain;
}

/* Große Buttons mit Icons */
.action-buttons {
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:14px;
}

.action-btn {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:16px 12px;
  border:none;
  border-radius:14px;
  font-size:1.15em;
  font-weight:bold;
  cursor:pointer;
  width:100%;
  box-sizing:border-box;
  transition: filter 0.15s, transform 0.1s;
}

.action-btn:active {
  filter: brightness(0.9);
  transform: scale(0.98);
}

.action-btn svg {
  width:26px;
  height:26px;
  flex-shrink:0;
}

.print-btn { background:#4CAF50; color:white; }
.speak-btn { background:#2196F3; color:white; }

/* Farben */
.milch{background:#64B5F6;}
.gemuese{background:#81C784;}
.obst{background:#FFB74D;}
.fleisch{background:#E57373;}
.wurst{background:#BA68C8;}
.fisch{background:#4DD0E1;}
.konserven{background:#A1887F;}
.getreide{background:#FFD54F;}
.gewuerze{background:#90A4AE;}
.suess{background:#F06292;}
.sonstiges{background:#BDBDBD;}

/* iPad Querformat & große Tablets */
@media (min-width: 768px) and (max-width: 1180px) {
  .categories { width:65%; }
  .cart { width:35%; }

  .item {
    width:110px;
    height:135px;
    margin:6px;
  }

  .item-img-wrap {
    width:75px;
    height:75px;
  }

  .item img {
    max-width:75px;
    max-height:75px;
  }
}

/* Schmale Bildschirme */
@media(max-width:767px){
  .categories,.cart{width:100%;}

  .item {
    width:calc(33% - 16px);
    height:130px;
    margin:6px;
  }

  .item-img-wrap {
    width:70px;
    height:70px;
  }

  .item img {
    max-width:70px;
    max-height:70px;
  }
}
</style>
</head>

<body>

<header>Einkaufsliste</header>

<div class="container">
  <div class="categories" id="categories"></div>

  <div class="cart">
    <h2>Meine Liste</h2>
    <div class="cart-items" id="cart"></div>

    <div class="action-buttons">
      <button class="action-btn print-btn" onclick="printList()">
        <!-- Drucker-Icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Drucken
      </button>

      <button class="action-btn speak-btn" onclick="speakList()">
        <!-- Lautsprecher-Icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        Vorlesen
      </button>
    </div>
  </div>
</div>

<script>
const imgPath = "icons/";

const data = {
"Milchprodukte":{class:"milch",items:[["Butter","butter"],["Crème Fine","creme_fine"],["Crème Fraîche","creme_fraiche"],["Feta","feta"],["Frischkäse","frischkaese"],["Joghurt","joghurt"],["Käse","kaese"],["Milch","milch"],["Mozzarella","mozzarella"],["Quark","quark"],["Saure Sahne","saure_sahne"],["Schlagsahne","schlagsahne"],["Schmand","schmand"]]},
"Gemüse":{class:"gemuese",items:[["Blumenkohl","blumenkohl"],["Brokkoli","brokkoli"],["Champignons","champignons"],["Gurke","gurke"],["Karotte","karotte"],["Kartoffeln","kartoffeln"],["Knoblauch","knoblauch"],["Lauch","lauch"],["Paprika","paprika"],["Salat","salat"],["Spinat","spinat"],["Tomate","tomate"],["Zucchini","zucchini"],["Zwiebel","zwiebel"]]},
"Obst":{class:"obst",items:[["Ananas","ananas"],["Apfel","apfel"],["Banane","banane"],["Birne","birne"],["Erdbeeren","erdbeeren"],["Kiwi","kiwi"],["Mandarinen","mandarinen"],["Nektarine","nektarine"],["Schattenmorellen","schattenmorellen"],["Trauben","trauben"]]},
"Fleisch":{class:"fleisch",items:[["Hackfleisch","hackfleisch"]]},
"Wurst":{class:"wurst",items:[["Grillwürstchen","grillwuerstchen"],["Leberwurst","leberwurst"],["Mortadella","mortadella"],["Salami","salami"],["Teewurst","teewurst"],["Wiener","wiener"]]},
"Fisch & Ei":{class:"fisch",items:[["Eier","eier"],["Thunfisch","thunfisch"],["TK Lachs","tk_lachs"]]},
"Konserven":{class:"konserven",items:[["Apfelmus","apfelmus"],["Dosenmais","dosenmais"],["Dosentomaten","dosentomaten"],["Kokosmilch","kokosmilch"],["Passierte Tomaten","passierte_tomaten"],["Saure Gurken","saure_gurken"],["TK Erbsen","tk_erbsen"]]},
"Getreideprodukte":{class:"getreide",items:[["Brötchen","broetchen"],["Brot","brot"],["Haferflocken","haferflocken"],["Mehl","mehl"],["Müsli","muesli"],["Nudeln","nudeln"],["Reis","reis"]]},
"Gewürze":{class:"gewuerze",items:[["Basilikum","basilikum"],["Curry","curry"],["Essig","essig"],["Gemüsebrühe","gemuesebruehe"],["Ketchup","ketchup"],["Mayonnaise","mayonnaise"],["Olivenöl","olivenoel"],["Oregano","oregano"],["Paprikapulver","paprikapulver"],["Pfeffer","pfeffer"],["Rapsöl","rapsoel"],["Salz","salz"],["Senf","senf"],["Sonnenblumenöl","sonnenblumenoel"],["Vanillezucker","vanillezucker"],["Zimt","zimt"]]},
"Süßes":{class:"suess",items:[["Cookies","cookies"],["Honig","honig"],["Nutella","nutella"],["Oreo","oreo"],["Schokopudding","schokopudding"],["Vanillepudding","vanillepudding"]]},
"Sonstiges":{class:"sonstiges",items:[["Tee","tee"]]}
};

let cart=[];

function speak(text){
  let s=new SpeechSynthesisUtterance(text);
  s.lang="de-DE";
  speechSynthesis.cancel();
  speechSynthesis.speak(s);
}

function createUI(){
  const c=document.getElementById("categories");

  for(let cat in data){
    let div=document.createElement("div");
    div.className="category";

    let h=document.createElement("h2");
    h.className=data[cat].class;
    h.innerText=cat;

    let items=document.createElement("div");
    items.className="items";

    data[cat].items.forEach(([name,file])=>{
      let el=document.createElement("div");
      el.className="item";
      el.innerHTML=`
        <div class="item-img-wrap">
          <img src="${imgPath}${file}.png" alt="${name}">
        </div>
        <div class="label">${name}</div>
      `;
      el.onclick=()=>{cart.push({name,file});updateCart();speak(name)};
      items.appendChild(el);
    });

    div.appendChild(h);
    div.appendChild(items);
    c.appendChild(div);
  }
}

function updateCart(){
  const c=document.getElementById("cart");
  c.innerHTML="";
  cart.forEach((i,idx)=>{
    let el=document.createElement("div");
    el.className="cart-item";
    el.innerHTML=`<img src="${imgPath}${i.file}.png" alt="${i.name}">`;
    el.onclick=()=>{cart.splice(idx,1);updateCart();};
    c.appendChild(el);
  });
}

function printList(){
  let counts = {};
  cart.forEach(i=>{
    if(!counts[i.name]){
      counts[i.name] = {count:0, file:i.file};
    }
    counts[i.name].count++;
  });

  function getDiceImages(n){
    let html = "";
    while(n > 0){
      let value = Math.min(n,6);
      html += `<img src="${imgPath}dice${value}.png"
                 style="width:70px;height:70px;margin-left:6px;object-fit:contain;">`;
      n -= value;
    }
    return html;
  }

  let w = window.open("");

  // Zurück-Button SVG (Haus-Icon)
  const homeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:8px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;

  let html = `
  <!DOCTYPE html>
  <html lang="de">
  <head>
    <meta charset="UTF-8">
    <title>Einkaufsliste – Druckansicht</title>
    <style>
      body { font-family: Arial; margin: 20px; background: #fff; }
      h1 { color: #4CAF50; }
      .back-btn {
        display: inline-flex;
        align-items: center;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 1.05em;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 20px;
        text-decoration: none;
      }
      .back-btn:hover { background: #388E3C; }
      @media print { .back-btn { display: none; } }
    </style>
  </head>
  <body>
    <button class="back-btn" onclick="window.close()">${homeIcon} Zurück zur Einkaufsliste</button>
    <h1>🛒 Einkaufsliste</h1>
    <div>
  `;

  for(let name in counts){
    let item = counts[name];
    html += `
      <div style="
        display:flex;
        align-items:center;
        padding:12px 0;
        border-bottom:2px solid #ccc;
      ">
        <img src="${imgPath}${item.file}.png"
             style="width:80px;height:80px;margin-right:20px;object-fit:contain;">
        <div style="flex:1;font-size:22px">
          ${item.count}x ${name}
        </div>
        <div style="display:flex;align-items:center">
          ${getDiceImages(item.count)}
        </div>
      </div>
    `;
  }

  html += `
    </div>
  </body>
  </html>`;

  w.document.write(html);
  w.document.close();
  w.print();
}

function speakList(){
  speak("Du brauchst: "+cart.map(i=>i.name).join(", "));
}

createUI();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
