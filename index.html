<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einkaufsliste</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

header {
  background:#4CAF50;
  color:white;
  text-align:center;
  padding:18px;
  font-size:1.8em;
  position:relative;
  z-index:20;
  width:100%;
  box-sizing:border-box;
}

.container {
  display:flex;
  flex-wrap:wrap;
  align-items:flex-start;
  min-height:100vh;
}

.categories { width:60%; padding:10px; }
.cart { width:40%; background:#E8F5E9; padding:10px; }

.category {
  margin-bottom:14px;
  display:inline-block;
  width:100%;
  background:transparent;
}

.category h2 {
  color:white;
  margin:0;
  padding:12px;
  font-size:1.3em;
  border-radius:16px 16px 0 0;
  display:table;
  box-sizing:border-box;
}

.items {
  display:flex;
  flex-wrap:wrap;
}

.item {
  width:130px;
  height:155px;
  margin:8px;
  background:white;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:2px solid transparent;
  transition: transform 0.1s, box-shadow 0.1s;
}

.item:active {
  transform: scale(0.95);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.item-img-wrap {
  width:90px;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.item img {
  max-width:90px;
  max-height:90px;
  width:auto;
  height:auto;
  object-fit:contain;
}

.label {
  font-size:clamp(12px,2.2vw,15px);
  text-align:center;
  padding:4px 4px 0 4px;
  line-height:1.2;
}

/* Warenkorb */
.cart-items {
  display:flex;
  flex-direction:column;
  width:100%;
}

.cart-entry {
  display:flex;
  align-items:center;
  gap:6px;
  margin:5px 0;
  width:100%;
}

.cart-item {
  width:70px;
  height:70px;
  background:#eee;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  overflow:hidden;
}

.cart-item img {
  max-width:52px;
  max-height:52px;
  width:auto;
  height:auto;
  object-fit:contain;
}

/* Eigener Artikel im Warenkorb */
.cart-item-text {
  width:70px;
  height:70px;
  background:#fff3e0;
  border:2px solid #FFB74D;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-size:11px;
  text-align:center;
  padding:4px;
  box-sizing:border-box;
  word-break:break-word;
  line-height:1.2;
}

/* Name + Mengensteuerung */
.cart-entry-info {
  flex:1;
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
}

.cart-entry-name {
  font-size:13px;
  font-weight:bold;
  word-break:break-word;
  line-height:1.2;
}

.cart-entry-controls {
  display:flex;
  align-items:center;
  gap:6px;
}

.qty-btn {
  width:28px;
  height:28px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  font-size:1.2em;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  line-height:1;
}

.qty-btn.minus { background:#e57373; }
.qty-btn:active { filter: brightness(0.85); }

.qty-count {
  font-size:1.1em;
  font-weight:bold;
  min-width:20px;
  text-align:center;
}

/* Eingabebereich */
.custom-input {
  display:flex;
  gap:6px;
  margin-top:14px;
  margin-bottom:4px;
}

.custom-input input {
  flex:1;
  padding:12px 10px;
  border:2px solid #ddd;
  border-radius:12px;
  font-size:1em;
  outline:none;
  box-sizing:border-box;
  min-width:0;
}

.custom-input input:focus { border-color:#4CAF50; }

.mic-btn {
  background:#FF7043;
  color:white;
  border:none;
  border-radius:12px;
  width:48px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  transition: background 0.2s;
}

.mic-btn.listening {
  background:#e53935;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.5); }
  50%      { box-shadow: 0 0 0 8px rgba(229,57,53,0); }
}

.mic-btn svg { width:22px; height:22px; }

.add-btn {
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:12px;
  width:48px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}

.add-btn:active { filter: brightness(0.85); }
.add-btn svg { width:24px; height:24px; }

.action-buttons {
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}

.action-btn {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:16px 12px;
  border:none;
  border-radius:14px;
  font-size:1.15em;
  font-weight:bold;
  cursor:pointer;
  width:100%;
  box-sizing:border-box;
  transition: filter 0.15s, transform 0.1s;
}

.action-btn:active { filter: brightness(0.9); transform: scale(0.98); }
.action-btn svg { width:26px; height:26px; flex-shrink:0; }

.print-btn { background:#CE93D8; color:white; }
.speak-btn { background:#2196F3; color:white; }
.clear-btn { background:#212121; color:white; }

/* Kategoriebalken (h2) Farben */
.milch{background:#64B5F6;}
.gemuese{background:#81C784;}
.obst{background:#FFB74D;}
.fleisch{background:#E57373;}
.wurst{background:#BA68C8;}
.fisch{background:#4DD0E1;}
.konserven{background:#A1887F;}
.getreide{background:#FFD54F;}
.gewuerze{background:#90A4AE;}
.suess{background:#F06292;}
.sonstiges{background:#BDBDBD;}

/* Artikelkarten: weiß */
.category .item { background:#ffffff !important; border-color:#ddd !important; }

@media (min-width: 768px) and (max-width: 1180px) {
  .categories { width:65%; }
  .cart {
    width:35%;
    position:fixed;
    top:0;
    right:0;
    height:100vh;
    overflow-y:auto;
    box-sizing:border-box;
    box-shadow:-4px 0 12px rgba(0,0,0,0.08);
  }
  .item { width:110px; height:135px; margin:6px; }
  .item-img-wrap { width:75px; height:75px; }
  .item img { max-width:75px; max-height:75px; }
}

/* Desktop: fixed cart */
@media (min-width: 1181px) {
  .categories { width:60%; }
  .cart {
    width:40%;
    position:fixed;
    top:0;
    right:0;
    height:100vh;
    overflow-y:auto;
    box-sizing:border-box;
    box-shadow:-4px 0 12px rgba(0,0,0,0.08);
  }
}

@media(max-width:767px){
  .categories,.cart{width:100%;}
  .item { width:calc(33% - 16px); height:130px; margin:6px; }
  .item-img-wrap { width:70px; height:70px; }
  .item img { max-width:70px; max-height:70px; }
}
</style>
</head>

<body>

<header>Einkaufsliste</header>

<div class="container">
  <div class="categories" id="categories"></div>

  <div class="cart">
    <h2>Meine Liste</h2>
    <div class="cart-items" id="cart"></div>

    <div class="custom-input">
      <input type="text" id="customItem" placeholder="Eigener Artikel..."
        maxlength="60" onkeydown="if(event.key==='Enter') addCustomItem()">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Spracheingabe">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M19 10a7 7 0 0 1-14 0"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="add-btn" onclick="addCustomItem()" title="Hinzufügen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="action-buttons">
      <button class="action-btn print-btn" onclick="printList()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Drucken
      </button>
      <button class="action-btn speak-btn" onclick="speakList()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        Vorlesen
      </button>
      <button class="action-btn clear-btn" onclick="clearList()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
        Liste löschen!
      </button>
    </div>
  </div>
</div>

<script>
const imgPath = "icons/";
let cart = [];
let recognition = null;
let isListening = false;

const data = {
"Milchprodukte":{class:"milch",items:[["Butter","butter"],["Crème Fine","creme_fine"],["Crème Fraîche","creme_fraiche"],["Emmentaler","emmentaler"],["Feta","feta"],["Frischkäse","frischkaese"],["Joghurt","joghurt"],["Käse","kaese"],["Mascarpone","mascarpone"],["Milch","milch"],["Mozzarella","mozzarella"],["Parmesan","parmesan"],["Quark","quark"],["Saure Sahne","saure_sahne"],["Schlagsahne","schlagsahne"],["Schmand","schmand"]]},
"Gemüse":{class:"gemuese",items:[["Blumenkohl","blumenkohl"],["Brokkoli","brokkoli"],["Champignons","champignons"],["Erbsen","erbsen"],["Gurke","gurke"],["Karotten","karotte"],["Kartoffeln","kartoffeln"],["Knoblauch","knoblauch"],["Kürbis","kuerbis"],["Lauch","lauch"],["Paprika","paprika"],["Salat","salat"],["Spinat","spinat"],["Tomaten","tomate"],["Zucchini","zucchini"],["Zwiebeln","zwiebel"]]},
"Obst":{class:"obst",items:[["Äpfel","apfel"],["Banane","banane"],["Birne","birne"],["Erdbeeren","erdbeeren"],["Kiwi","kiwi"],["Mandarinen","mandarinen"],["Nektarine","nektarine"],["Trauben","trauben"],["Zitrone","zitrone"]]},
"Fleisch":{class:"fleisch",items:[["Hackfleisch","hackfleisch"],["Speckwürfel","speckwuerfel"]]},
"Wurst":{class:"wurst",items:[["Grillwürstchen","grillwuerstchen"],["Leberwurst","leberwurst"],["Mortadella","mortadella"],["Salami","salami"],["Teewurst","teewurst"],["Wiener","wiener"]]},
"Fisch & Ei":{class:"fisch",items:[["Eier","eier"],["Fischstäbchen","fischstaebchen"],["Thunfisch","thunfisch"],["TK Lachs","tk_lachs"]]},
"Konserven":{class:"konserven",items:[["Apfelmus","apfelmus"],["Ananas","ananas"],["Dosenmais","dosenmais"],["Dosenpfirsiche","dosenpfirsiche"],["Dosentomaten","dosentomaten"],["Getrocknete Tomaten","getrocknete_tomaten"],["Kokosmilch","kokosmilch"],["Passierte Tomaten","passierte_tomaten"],["Saure Gurken","saure_gurken"],["Schattenmorellen","schattenmorellen"]]},
"Getreide & Hülsenfrüchte":{class:"getreide",items:[["Blätterteig","blaetterteig"],["Brötchen","broetchen"],["Brot","brot"],["Haferflocken","haferflocken"],["Mehl","mehl"],["Müsli","muesli"],["Nudeln","nudeln"],["Reis","reis"],["Rote Linsen","rote_linsen"],["Tortellini","tortellini"],["Yum Yum","yum_yum"]]},
"Gewürze & Öl":{class:"gewuerze",items:[["Balsamico","balsamico"],["Basilikum","basilikum"],["Curry","curry"],["Essig","essig"],["Gemüsebrühe","gemuesebruehe"],["Italienische Kräuter","italienische_kraeuter"],["Ketchup","ketchup"],["Majoran","majoran"],["Mayonnaise","mayonnaise"],["Muskatnuss","muskatnuss"],["Olivenöl","olivenoel"],["Oregano","oregano"],["Paprikapulver","paprikapulver"],["Petersilie","petersilie"],["Pfeffer","pfeffer"],["Rapsöl","rapsoel"],["Salz","salz"],["Schnittlauch","schnittlauch"],["Senf","senf"],["Sonnenblumenöl","sonnenblumenoel"],["Zimt","zimt"]]},
"Süßes":{class:"suess",items:[["Cookies","cookies"],["Honig","honig"],["Lebensmittelfarbe","lebensmittelfarbe"],["Nüsse","nuesse"],["Nutella","nutella"],["Oreo","oreo"],["Puderzucker","puderzucker"],["Schokoküsse","schokokuesse"],["Schokopudding","schokopudding"],["Toffifee","toffifee"],["Vanillepudding","vanillepudding"],["Zuckerstreusel","zuckerstreusel"]]},
"Sonstiges":{class:"sonstiges",items:[["Backpulver","backpulver"],["Sahnesteif","sahnesteif"],["Tee","tee"],["Trockenhefe","trockenhefe"],["Vanillezucker","vanillezucker"],["Zucker","zucker"]]}
};

// ── Spracheingabe ──────────────────────────────────────────
function toggleMic(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert("Dein Browser unterstützt keine Spracheingabe. Bitte Chrome oder Safari verwenden.");
    return;
  }
  if(isListening){ recognition.stop(); return; }

  recognition = new SpeechRecognition();
  recognition.lang = "de-DE";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById("micBtn").classList.add("listening");
    document.getElementById("customItem").placeholder = "Höre zu...";
  };

  recognition.onresult = (event) => {
    document.getElementById("customItem").value = event.results[0][0].transcript;
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById("micBtn").classList.remove("listening");
    document.getElementById("customItem").placeholder = "Eigener Artikel...";
    const val = document.getElementById("customItem").value.trim();
    if(val) addCustomItem();
  };

  recognition.onerror = (e) => {
    isListening = false;
    document.getElementById("micBtn").classList.remove("listening");
    document.getElementById("customItem").placeholder = "Eigener Artikel...";
    if(e.error !== "no-speech") alert("Spracheingabe Fehler: " + e.error);
  };

  recognition.start();
}

// ── Eigenen Artikel hinzufügen ─────────────────────────────
function addCustomItem(){
  const input = document.getElementById("customItem");
  const name = input.value.trim();
  if(!name) return;
  cart.push({name, file:null, custom:true});
  updateCart();
  speak(name);
  input.value = "";
  input.focus();
}

// ── Sprechen ───────────────────────────────────────────────
function speak(text){
  let s = new SpeechSynthesisUtterance(text);
  s.lang = "de-DE";
  speechSynthesis.cancel();
  speechSynthesis.speak(s);
}

// ── UI aufbauen ────────────────────────────────────────────
function createUI(){
  const c = document.getElementById("categories");
  for(let cat in data){
    let div = document.createElement("div");
    div.className = "category " + data[cat].class;
    let h = document.createElement("h2");
    h.className = data[cat].class;
    h.innerText = cat;
    let items = document.createElement("div");
    items.className = "items";
    data[cat].items.forEach(([name,file])=>{
      let el = document.createElement("div");
      el.className = "item";
      el.innerHTML = `
        <div class="item-img-wrap">
          <img src="${imgPath}${file}.png" alt="${name}">
        </div>
        <div class="label">${name}</div>
      `;
      el.onclick = ()=>{ cart.push({name,file}); updateCart(); speak(name); };
      items.appendChild(el);
    });
    div.appendChild(h);
    div.appendChild(items);
    c.appendChild(div);
  }
}

// ── Warenkorb ──────────────────────────────────────────────
function updateCart(){
  const c = document.getElementById("cart");
  c.innerHTML = "";

  // Artikel gruppieren
  const groups = [];
  const seen = {};
  cart.forEach(i => {
    const key = i.name;
    if(seen[key] !== undefined){
      groups[seen[key]].count++;
    } else {
      seen[key] = groups.length;
      groups.push({...i, count:1});
    }
  });

  groups.forEach(i => {
    const entry = document.createElement("div");
    entry.className = "cart-entry";

    // Bild oder Text
    const img = document.createElement("div");
    if(i.custom){
      img.className = "cart-item-text";
      img.innerText = i.name;
    } else {
      img.className = "cart-item";
      img.innerHTML = `<img src="${imgPath}${i.file}.png" alt="${i.name}">`;
    }

    // Info + Steuerung
    const info = document.createElement("div");
    info.className = "cart-entry-info";
    info.innerHTML = `
      <div class="cart-entry-name">${i.name}</div>
      <div class="cart-entry-controls">
        <button class="qty-btn minus">−</button>
        <span class="qty-count">${i.count}</span>
        <button class="qty-btn plus">+</button>
      </div>
    `;

    // Minus: einen entfernen
    info.querySelector(".minus").onclick = () => {
      const idx = cart.findLastIndex(x => x.name === i.name);
      if(idx !== -1){ cart.splice(idx,1); updateCart(); }
    };

    // Plus: einen hinzufügen
    info.querySelector(".plus").onclick = () => {
      cart.push({name:i.name, file:i.file, custom:i.custom||false});
      updateCart();
    };

    entry.appendChild(img);
    entry.appendChild(info);
    c.appendChild(entry);
  });
}

// ── Drucken ────────────────────────────────────────────────
function printList(){
  let counts = {};
  cart.forEach(i=>{
    if(!counts[i.name]) counts[i.name] = {count:0, file:i.file, custom:i.custom||false};
    counts[i.name].count++;
  });

  function getDiceImages(n){
    let html = "";
    while(n > 0){
      let v = Math.min(n,6);
      html += `<img src="${imgPath}dice${v}.png" style="width:70px;height:70px;margin-left:6px;object-fit:contain;">`;
      n -= v;
    }
    return html;
  }

  let w = window.open("");
  const homeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:8px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;

  let html = `<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
  <title>Einkaufsliste – Druckansicht</title>
  <style>
    body{font-family:Arial;margin:20px;background:#fff;}
    h1{color:#4CAF50;}
    .back-btn{display:inline-flex;align-items:center;background:#4CAF50;color:white;
      border:none;border-radius:12px;padding:12px 20px;font-size:1.05em;
      font-weight:bold;cursor:pointer;margin-bottom:20px;}
    .back-btn:hover{background:#388E3C;}
    @media print{.back-btn{display:none;}}
  </style></head><body>
  <button class="back-btn" onclick="window.close()">${homeIcon} Zurück zur Einkaufsliste</button>
  <h1>🛒 Einkaufsliste</h1><div>`;

  for(let name in counts){
    let item = counts[name];
    let imgHtml = item.custom
      ? `<div style="width:80px;height:80px;margin-right:20px;flex-shrink:0;"></div>`
      : `<img src="${imgPath}${item.file}.png" style="width:80px;height:80px;margin-right:20px;object-fit:contain;">`;

    html += `<div style="display:flex;align-items:center;padding:12px 0;border-bottom:2px solid #ccc;">
      ${imgHtml}
      <div style="flex:1;font-size:22px">${item.count}x ${name}</div>
      <div style="display:flex;align-items:center">${getDiceImages(item.count)}</div>
    </div>`;
  }

  html += `</div></body></html>`;
  w.document.write(html);
  w.document.close();
  w.print();
}

// ── Liste löschen ─────────────────────────────────────────
function clearList(){
  if(cart.length === 0) return;
  if(confirm("Liste wirklich löschen?")){ cart = []; updateCart(); }
}

// ── Vorlesen ───────────────────────────────────────────────
function speakList(){
  speak("Du brauchst: " + cart.map(i=>i.name).join(", "));
}

createUI();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
